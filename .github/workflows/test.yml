name: tests

# Push events only on main; branch commits are covered by their pull_request event, so a branch
# with an open PR does not double-run. Concurrency collapses superseded runs on the same ref.
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest   # ships bash and python3, both required by the scripts
    steps:
      - uses: actions/checkout@v4
      - name: Run deterministic test suite
        run: bash test/all.sh
